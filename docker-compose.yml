version: "3.9"
services:
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"

  users-api:
    build:
      context: .
      args:
        PROJECT: fcg-users-api
    ports:
      - "5001:8080"
    environment:
      Jwt__Secret: "dev-secret-change-me-dev-secret-change-me"
      RabbitMq__Uri: "amqp://guest:guest@rabbitmq:5672"

  catalog-api:
    build:
      context: .
      args:
        PROJECT: fcg-catalog-api
    ports:
      - "5002:8080"
    environment:
      RabbitMq__Uri: "amqp://guest:guest@rabbitmq:5672"
    depends_on:
      - rabbitmq

  payments-api:
    build:
      context: .
      args:
        PROJECT: fcg-payments-api
    ports:
      - "5003:8080"
    environment:
      RabbitMq__Uri: "amqp://guest:guest@rabbitmq:5672"
    depends_on:
      - rabbitmq

  notifications-api:
    build:
      context: .
      args:
        PROJECT: fcg-notifications-api
    ports:
      - "5004:8080"
