apiVersion: apps/v1
kind: Deployment
metadata:
  name: fcg-users-api
spec:
  replicas: 2
  selector:
    matchLabels: { app: fcg-users-api }
  template:
    metadata:
      labels: { app: fcg-users-api }
    spec:
      containers:
        - name: api
          image: fcg-users-api:latest
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 8080 }]
          envFrom: [{ configMapRef: { name: fcg-config } }]
          env:
            - name: Jwt__Secret
              value: dev-secret-change-me-dev-secret-change-me
---
apiVersion: v1
kind: Service
metadata:
  name: fcg-users-api
spec:
  selector: { app: fcg-users-api }
  ports: [{ port: 80, targetPort: 8080 }]
